<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundepar - Sistema Profissional de Gestão de Workflow</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script> 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script defer src="auth.js"></script> 
    <script defer src="views.js"></script>
    <script defer src="app.js"></script>  

    <style>
        /* Preloader instantâneo para não dar sensação de tela travada */
        #initial-loader {
            position: fixed; inset: 0; background: #f8fafc; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; transition: opacity 0.4s ease;
        }
        .spinner-loader {
            width: 48px; height: 48px; border: 4px solid #e2e8f0; 
            border-top-color: #0c4a6e; border-radius: 50%; 
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="light">

    <div id="initial-loader">
        <div class="spinner-loader"></div>
        <h3 style="margin-top: 20px; color: #0c4a6e; font-weight: 700;">Fundepar TI</h3>
        <p style="color: #64748b; font-size: 14px; margin-top: 4px;">Iniciando sistema...</p>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div id="app">
        <div id="auth-container" class="auth-container fade-in hidden"></div>

        <div id="app-container" class="app-container hidden">
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div style="background: var(--primary-color); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-radius: 8px;">F</div>
                    <h1>Fundepar <span>TI</span></h1>
                </div>

                <nav class="sidebar-menu">
                    <ul>
                        <li class="active"><a href="#dashboard" class="nav-link"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                        <li><a href="#workflow" class="nav-link"><i data-lucide="kanban-square"></i> Workflow (Kanban)</a></li>
                        <li class="separator">Administração</li>
                        <li><a href="#salas" class="nav-link"><i data-lucide="map-pin"></i> Cadastro de Salas</a></li>
                        <li><a href="#usuarios" class="nav-link"><i data-lucide="users"></i> Cadastro de Usuários</a></li>
                    </ul>
                </nav>

                <div id="sidebar-profile" class="sidebar-profile"></div>
            </aside>

            <main class="main-content">
                <header class="topbar">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button id="mobile-menu-btn" class="btn-icon hidden-desktop" onclick="App.toggleMobileMenu()">
                            <i data-lucide="menu"></i>
                        </button>
                        <div class="search-bar">
                            <i data-lucide="search"></i>
                            <input type="text" placeholder="Pesquisar chamados, salas...">
                        </div>
                    </div>
                    <div class="topbar-actions">
                        <button class="btn-icon"><i data-lucide="bell"></i><span class="badge"></span></button>
                    </div>
                </header>

                <div id="view-content" class="view-content fade-in"></div>
            </main>
        </div>
    </div>

    <div id="modal-root"></div>

    <script>
        // Inicia ícones se carregarem rápido, senão o app.js cuida disso depois
        if(typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
