<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fundepar - Sistema Profissional de Gestão de Workflow</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script> 

    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS (exportar/importar Excel) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- ZXing (fallback scanner para Firefox/Safari) -->
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    
    <!-- Scripts da aplicação -->
    <script defer src="auth.js"></script> 
    <script defer src="views.js"></script>
    <script defer src="app.js"></script>  
</head>
<body class="light">

    <!-- Sistema de Notificações -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Contêiner Principal da SPA -->
    <div id="app">
        <!-- Autenticação -->
        <div id="auth-container" class="auth-container fade-in hidden"></div>

        <!-- App Principal -->
        <div id="app-container" class="app-container hidden">
            <!-- Barra Lateral -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div style="background: var(--primary-color); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-radius: 8px;">F</div>
                    <h1>Fundepar <span>TI</span></h1>
                </div>

                <nav class="sidebar-menu">
                    <ul>
                        <li class="active"><a href="#dashboard" class="nav-link"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                        <li><a href="#workflow" class="nav-link"><i data-lucide="kanban-square"></i> Workflow (Kanban)</a></li>
                        <li class="separator">Patrimônio</li>
                        <li><a href="#equipamentos" class="nav-link"><i data-lucide="package"></i> Equipamentos</a></li>
                        <li><a href="#movimentacoes" class="nav-link"><i data-lucide="arrow-right-left"></i> Movimentações</a></li>
                        <li><a href="#rastreio" class="nav-link"><i data-lucide="search"></i> Rastreio</a></li>
                        <li><a href="#mapa-salas" class="nav-link"><i data-lucide="layout-grid"></i> Mapa de Salas</a></li>
                        <li class="separator">Administração</li>
                        <li><a href="#salas" class="nav-link"><i data-lucide="map-pin"></i> Cadastro de Salas</a></li>
                        <li><a href="#usuarios" class="nav-link"><i data-lucide="users"></i> Cadastro de Usuários</a></li>
                        <li><a href="#perfil" class="nav-link"><i data-lucide="circle-user"></i> Meu Perfil</a></li>
                    </ul>
                </nav>

                <div id="sidebar-profile" class="sidebar-profile"></div>
            </aside>

            <!-- Área Principal -->
            <main class="main-content">
                <header class="topbar">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button id="mobile-menu-btn" class="btn-icon hidden-desktop" onclick="App.toggleMobileMenu()">
                            <i data-lucide="menu"></i>
                        </button>
                        <div class="search-bar">
                            <i data-lucide="search"></i>
                            <input type="text" id="global-search" placeholder="Pesquisar..." oninput="App.globalSearch(this.value)">
                        </div>
                    </div>
                    <div class="topbar-actions">
                        <button class="btn-icon" onclick="App.scanner.open()" title="Escanear patrimônio">
                            <i data-lucide="scan-line"></i>
                        </button>
                        <button id="dark-mode-btn" class="btn-icon" onclick="App.darkMode.toggle()" title="Alternar tema">
                            <i data-lucide="moon"></i>
                        </button>
                        <button id="notif-btn" class="btn-icon" onclick="App.notifications.toggle()" title="Notificações">
                            <i data-lucide="bell"></i>
                            <span id="notif-badge" style="display:none;"></span>
                        </button>
                    </div>
                </header>
                <div id="notifications-panel" class="notifications-panel hidden"></div>
                <div id="notifications-backdrop" class="notifications-backdrop" onclick="App.notifications.close()"></div>

                <div id="view-content" class="view-content fade-in"></div>
            </main>
        </div>
    </div>

    <!-- Root para Modais (Formulários flutuantes) -->
    <div id="modal-root"></div>

    <!-- Backdrop do Sidebar Mobile -->
    <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="App.closeMobileMenu()"></div>

    <script>lucide.createIcons();</script>
</body>
</html>
